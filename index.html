  <style>
    :root {
      --primary: #ffa500;
      --dark: #121212;
      --card: #1e1e1e;
      --text: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--dark);
      color: var(--text);
      line-height: 1.6;
      text-align: center;
    }

    /* --- HEADER E DESIGN --- */
    header {
      padding: 25px 15px;
      background: #1a1a1a;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 {
      color: var(--primary);
      font-size: 2.2em;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #aaa;
      font-size: 1.1em;
      margin-bottom: 15px;
    }

    /* --- ESPAÇO PARA IMAGEM (NOVO DESIGN) --- */
    .hero-banner {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .hero-banner img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      display: block;
    }

    /* --- FILTROS --- */
    .filters {
      max-width: 1000px;
      margin: 25px auto 15px;
      padding: 0 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 50px;
      background: #2a2a2a;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .filter-btn.active {
      background: var(--primary);
      color: #000;
      box-shadow: 0 0 15px rgba(255,165,0,0.5);
    }

    .search-bar {
      max-width: 1000px;
      margin: 0 auto 25px;
      padding: 0 15px;
    }

    .search-bar input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 50px;
      border: none;
      background: #2a2a2a;
      color: #fff;
      font-size: 1.1em;
    }

    /* --- LISTA DE ANIMES (GRID 2-2 NO MOBILE) --- */
    .anime-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 15px;
    }

    .anime-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 25px;
      padding-bottom: 40px;
    }

    .anime-item {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
      position: relative;
      text-align: left;
    }

    .anime-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(255,165,0,0.3);
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: bold;
      z-index: 2;
    }

    .badge.dublado { background: #00c853; color: #000; }
    .badge.legendado { background: #2196f3; color: #fff; }

    .anime-content { padding: 20px; }

    .anime-item a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1em;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }

    .anime-item p { color: #bbb; font-size: 0.95em; }

    /* RESPONSIVIDADE CELULAR (2 por linha) */
    @media (max-width: 768px) {
      .anime-list {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .anime-content { padding: 12px; }
      .anime-item a { font-size: 0.9em; }
      .anime-item p { font-size: 0.75em; }
    }

    .banner {
      width: 100%;
      max-width: 1100px;
      border-radius: 16px;
      margin: 40px auto;
      display: block;
    }

    footer {
      background: #1a1a1a;
      padding: 30px;
      color: #888;
      margin-top: 60px;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
  </style>
</head>

    let currentFilter = 'todos';

    // MANTIDO: Lógica de renderização com adição de Badges e Filtro
    function renderAnimeList(search = '') {
      const animeList = document.getElementById('animeList');
      animeList.innerHTML = '';

      const filtered = animes
        .filter(anime => {
          const matchSearch = anime.title.toLowerCase().includes(search.toLowerCase());
          if (currentFilter === 'todos') return matchSearch;
          if (currentFilter === 'dublado') return matchSearch && anime.dubbed === true;
          if (currentFilter === 'legendado') return matchSearch && anime.dubbed === false;
          return matchSearch;
        })
        .sort((a, b) => a.title.localeCompare(b.title));

      filtered.forEach(anime => {
        const badge = anime.dubbed ? '<span class="badge dublado">DUB</span>' : '<span class="badge legendado">LEG</span>';
        const div = document.createElement('div');
        div.className = 'anime-item';
        div.innerHTML = `
          ${badge}
          <div class="anime-content">
            <a href="${anime.url}" class="anime-link">${anime.title}</a>
            <p>${anime.description}</p>
          </div>
        `;
        animeList.appendChild(div);
      });
    }

    // MANTIDO: Lógica do Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // MANTIDO: Script de exibição de anúncios (waitForSDK e showAd)
    function waitForSDK(maxAttempts = 5, interval = 1000) {
      return new Promise((resolve, reject) => {
        let attempts = 0;
        const checkSDK = setInterval(() => {
          if (typeof window.show_10011677 === 'function') {
            clearInterval(checkSDK);
            resolve();
          } else if (attempts >= maxAttempts) {
            clearInterval(checkSDK);
            reject(new Error('Libtl SDK não carregado'));
          }
          attempts++;
        }, interval);
      });
    }

    function showAd() {
      return new Promise((resolve) => {
        const adFeedback = document.getElementById('adFeedback');
        adFeedback.style.display = 'block';
        waitForSDK()
          .then(() => {
            window.show_10011677().then(() => {
              tg.HapticFeedback.notificationOccurred('success');
              adFeedback.style.display = 'none';
              resolve();
            }).catch(() => {
              adFeedback.style.display = 'none';
              resolve();
            });
          })
          .catch(() => {
            adFeedback.style.display = 'none';
            resolve();
          });
      });
    }

    // Altere a parte final do seu script por esta:
document.addEventListener('click', (e) => {
  const link = e.target.closest('.anime-link');
  if (link) {
    e.preventDefault();
    const href = link.getAttribute('href');
    
    if (href === '#') {
      alert('Link em breve!');
      return;
    }

    // Mostra o feedback de carregamento
    const adFeedback = document.getElementById('adFeedback');
    adFeedback.innerHTML = "Carregando anúncio... Após fechar, clique no link novamente.";
    adFeedback.style.display = 'block';

    showAd().then(() => {
      // No iPhone, após o anúncio, o ideal é transformar o feedback em um botão real
      adFeedback.innerHTML = `<button onclick="window.open('${href}', '_blank')" 
        style="background: #ffa500; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
        CLIQUE AQUI PARA ACESSAR O DRIVE
      </button>`;
    });
  }
});

    // NOVO: Lógica dos botões de filtro
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderAnimeList(document.getElementById('searchInput').value);
      });
    });

    // MANTIDO: Campo de Pesquisa
    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderAnimeList(e.target.value);
    });

    // Render Inicial
    renderAnimeList();
  </script>
