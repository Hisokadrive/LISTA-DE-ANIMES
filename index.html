<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Arial, sans-serif;
      padding-bottom: 80px;
    }

    /* Header */
    header {
      background: #000;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 26px;
      font-weight: 700;
    }

    /* Seções */
    .section {
      padding: 20px 15px 10px;
    }
    .section-title {
      font-size: 22px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mais-btn {
      background: #e50914;
      color: white;
      border: none;
      padding: 6px 18px;
      border-radius: 30px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Cards */
    .row {
      display: flex;
      overflow-x: auto;
      gap: 14px;
      padding-bottom: 15px;
      scrollbar-width: none;
    }
    .row::-webkit-scrollbar {
      display: none;
    }
    .card {
      min-width: 170px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .card:hover {
      transform: scale(1.06);
    }
    .card img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.8);
    }
    .card-info {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-tags {
      font-size: 13px;
      color: #bbb;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.98);
      z-index: 300;
      padding: 20px 15px;
      overflow-y: auto;
    }
    .modal-content {
      max-width: 400px;
      margin: 0 auto;
      background: #111;
      border-radius: 14px;
      overflow: hidden;
    }
    .close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 42px;
      color: #ddd;
      cursor: pointer;
      z-index: 10;
    }
    .modal-poster {
      width: 100%;
    }
    .modal-body {
      padding: 20px;
    }
    .modal-title {
      font-size: 24px;
      margin-bottom: 12px;
    }
    .modal-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 15px 0;
    }
    .modal-tags span {
      background: #222;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13.5px;
    }
    .btn-ver {
      background: #e50914;
      color: white;
      border: none;
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 30px;
      margin: 20px 0 15px;
      cursor: pointer;
    }
    .player-container {
      margin-top: 25px;
      display: none;
    }
    iframe {
      width: 100%;
      height: 240px;
      border: none;
      border-radius: 10px;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #111;
      padding: 10px 0 6px;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #333;
      font-size: 12px;
    }
    footer div {
      text-align: center;
    }
    footer div i {
      font-size: 26px;
      display: block;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Início</h1>
    <div style="font-size: 28px;">⟳ 🔍</div>
  </header>

  <!-- Séries -->
  <div class="section">
    <div class="section-title">
      <span>Séries</span>
      <button class="mais-btn">Mais ></button>
    </div>
    <div class="row" id="series-row"></div>
  </div>

  <!-- Filmes -->
  <div class="section">
    <div class="section-title">
      <span>Filmes</span>
      <button class="mais-btn">Mais ></button>
    </div>
    <div class="row" id="filmes-row"></div>
  </div>

  <!-- Animes -->
  <div class="section">
    <div class="section-title">
      <span>Animes</span>
      <button class="mais-btn">Mais ></button>
    </div>
    <div class="row" id="animes-row"></div>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <span class="close" onclick="closeModal()">×</span>
    <div class="modal-content" id="modal-content"></div>
  </div>

  <footer>
    <div>🏠<br>Início</div>
    <div>🔺<br>Explorar</div>
    <div>📈<br></div>
    <div>▶️<br></div>
    <div>👤<br>Perfil</div>
  </footer>

  <script>
    // Dados dos conteúdos
    const series = [
      {title: "Máxima", img: "https://picsum.photos/id/1015/300/420", type: "SÉRIE | DUB", year: "2024"},
      {title: "Trust", img: "https://picsum.photos/id/201/300/420", type: "SÉRIE | DUB", year: "2018"},
      {title: "Lose My Heart", img: "https://picsum.photos/id/301/300/420", type: "DORAMA | LEG", year: ""}
    ];

    const filmes = [
      {title: "Um Cabra Bom de Bola", img: "https://picsum.photos/id/401/300/420", type: "FILME | DUB", year: "2026"},
      {title: "Doze é Demais 2", img: "https://picsum.photos/id/501/300/420", type: "FILME | DUB", year: "2005"},
      {title: "No Fim do Túnel", img: "https://picsum.photos/id/601/300/420", type: "FILME | DUB", year: ""}
    ];

    const animes = [
      {title: "Domador de Espíritos", img: "https://picsum.photos/id/701/300/420", type: "ANIME", year: ""},
      {title: "Rooster Fighter", img: "https://picsum.photos/id/801/300/420", type: "ANIME", year: ""},
      {title: "Release that Witch", img: "https://picsum.photos/id/1005/300/420", type: "ANIME | LEG", year: "2026"}
    ];

    // Função para criar cards
    function createCard(item) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${item.img}" alt="${item.title}">
        <div class="card-info">${item.title}</div>
        <div class="card-tags">${item.type} ${item.year ? ' • ' + item.year : ''}</div>
      `;
      card.onclick = () => openModal(item);
      return card;
    }

    // Preencher as secções
    series.forEach(item => document.getElementById('series-row').appendChild(createCard(item)));
    filmes.forEach(item => document.getElementById('filmes-row').appendChild(createCard(item)));
    animes.forEach(item => document.getElementById('animes-row').appendChild(createCard(item)));

    // Abrir modal ao clicar no card
    function openModal(item) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modal-content');

      content.innerHTML = `
        <img src="${item.img}" class="modal-poster" alt="${item.title}">
        <div class="modal-body">
          <div class="modal-title">${item.title}</div>
          <div class="modal-tags">
            <span>${item.type}</span>
            ${item.year ? `<span>${item.year}</span>` : ''}
            <span>Action & Adventure</span>
            <span>Animação</span>
          </div>
          <button class="btn-ver" onclick="showPlayer(this)">▶ Ver Episódios</button>
          <p><strong>Sinopse:</strong> Em uma época em que todos odeiam bruxas, um príncipe reencarnado fará tudo ao seu alcance para trazer paz entre humanos e bruxas.</p>
        </div>
      `;
      modal.style.display = 'block';
    }

    // Mostrar player direto
    function showPlayer(btn) {
      const modalBody = btn.parentElement;
      modalBody.innerHTML += `
        <div class="player-container" style="display:block;">
          <h3 style="margin-bottom:10px; color:#e50914;">Episódio 1 • Legendado</h3>
          <iframe src="https://www.youtube.com/embed/S4P2Mr_Cwys" 
            title="Release that Witch" 
            allowfullscreen></iframe>
        </div>
      `;
      btn.style.display = 'none';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    // Fechar modal clicando fora
    window.onclick = function(e) {
      if (e.target.id === 'modal') closeModal();
    };
  </script>
</body>
</html>
